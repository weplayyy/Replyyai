name: Generate Keystore (one-time)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore wechat-release.keystore \
            -alias wechat \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass wechat123 -keypass wechat123 \
            -dname "CN=WeChat, OU=App, O=WeChat, L=City, S=State, C=US"

          echo ""
          echo "================ SHA-1 (COPY THIS FOR FIREBASE) ================"
          keytool -list -v -keystore wechat-release.keystore -alias wechat -storepass wechat123 | grep "SHA1:"
          echo "================================================================"
          echo ""
          echo "================ KEYSTORE BASE64 (COPY THIS FOR SECRET) ================"
          base64 -w 0 wechat-release.keystore
          echo ""
          echo "========================================================================"

      - uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: wechat-release.keystore
