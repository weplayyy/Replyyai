name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/wechat-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=wechat-release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Re-encode gift videos to H.264 baseline
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          mkdir -p assets/gifts/_src
          for f in assets/gifts/*.mp4; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            mv "$f" "assets/gifts/_src/$name"
            ffmpeg -y -i "assets/gifts/_src/$name" \
              -c:v libx264 -profile:v baseline -level 3.1 -pix_fmt yuv420p \
              -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
              -c:a aac -b:a 128k -ac 2 -ar 44100 \
              -movflags +faststart \
              "$f"
          done
          rm -rf assets/gifts/_src
          ls -lh assets/gifts/

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
