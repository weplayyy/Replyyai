name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/wechat-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=wechat-release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Clean stray files in assets/gifts
        run: |
          [ -f assets/gifts/a ] && rm -f assets/gifts/a || true
          rm -rf assets/gifts/_src
          ls -lh assets/gifts/ || true

      - name: Probe original gift videos (before re-encode)
        run: |
          echo "=========== ORIGINAL FILES ==========="
          shopt -s nullglob
          for f in assets/gifts/*.mp4; do
            echo "----- $f -----"
            ffprobe -v error -show_entries \
              stream=index,codec_type,codec_name,profile,pix_fmt,width,height,r_frame_rate,duration \
              -of default=nw=1 "$f" || echo "ffprobe failed on $f"
          done

      - name: Re-encode gift videos to H.264 baseline (Android-safe)
        run: |
          mkdir -p assets/gifts/_src
          shopt -s nullglob
          for f in assets/gifts/*.mp4; do
            name=$(basename "$f")
            mv "$f" "assets/gifts/_src/$name"

            ffmpeg -y -i "assets/gifts/_src/$name" \
              -map '0:v:0' -map '0:a:0?' \
              -c:v libx264 -profile:v baseline -level 3.1 -pix_fmt yuv420p \
              -preset veryfast -crf 23 \
              -vf "scale='min(720,iw)':-2,fps=30,format=yuv420p,pad=ceil(iw/2)*2:ceil(ih/2)*2" \
              -g 30 -keyint_min 30 -sc_threshold 0 \
              -c:a aac -b:a 128k -ac 2 -ar 44100 \
              -movflags +faststart \
              "$f"

            echo "----- ENCODED $f -----"
            ffprobe -v error -show_entries \
              stream=index,codec_type,codec_name,profile,pix_fmt,width,height,r_frame_rate,duration \
              -of default=nw=1 "$f"
          done
          rm -rf assets/gifts/_src
          echo "=========== FINAL FILES ==========="
          ls -lh assets/gifts/

      - name: Fail build if any gift video is invalid
        run: |
          shopt -s nullglob
          bad=0
          for f in assets/gifts/*.mp4; do
            dur=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=duration -of default=nw=1:nk=1 "$f")
            pix=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=pix_fmt -of default=nw=1:nk=1 "$f")
            cod=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=codec_name -of default=nw=1:nk=1 "$f")
            w=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=width -of default=nw=1:nk=1 "$f")
            h=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=height -of default=nw=1:nk=1 "$f")
            echo "$f -> codec=$cod pix=$pix dur=$dur ${w}x${h}"
            if [ "$cod" != "h264" ] || [ "$pix" != "yuv420p" ] \
               || [ -z "$dur" ] || [ "$dur" = "N/A" ] || [ "$dur" = "0.000000" ] \
               || [ $((w % 2)) -ne 0 ] || [ $((h % 2)) -ne 0 ]; then
              echo "::error file=$f::Invalid gift video (codec=$cod pix=$pix dur=$dur ${w}x${h})"
              bad=1
            fi
          done
          exit $bad

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
